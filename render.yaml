services:
  # 1. PostgreSQL Database
  - type: database
    name: bht-db
    databaseName: evv_logger
    user: postgres
    plan: free

  # 2. Go Backend API
  - type: web
    name: bht-backend
    env: docker
    dockerContext: ./backend
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: bht-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: bht-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: bht-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: bht-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: bht-db
          property: database
      - key: DB_SSLMODE
        value: require
      - key: SERVER_PORT
        value: 8080

  # 3. React Frontend (Serving via our Nginx Dockerfile)
  - type: web
    name: bht-frontend
    env: docker
    dockerContext: ./frontend
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: bht-backend
          type: web
          property: host
